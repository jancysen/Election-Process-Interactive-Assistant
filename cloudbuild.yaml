steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      [
        'run', 'deploy', 'election-process-interactive-assistant',
        '--image', 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA',
        '--platform', 'managed',
        '--region', 'us-central1',
        '--allow-unauthenticated',
        '--port', '8080'
      ]
images:
  - 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA'
substitutions:
  _SERVICE: 'election-process-interactive-assistant'
  _REGION: 'us-central1'
